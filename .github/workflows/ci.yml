name: ci
on: [push, pull_request]

jobs:
  # arm64 cross-compile for the RK3588 target (aarch64, Cortex-A76+A55). This is the
  # ONLY supported target arch — it compiles the whole tree, including the PipeWire
  # targets (Pw.cpp, PwNode.cpp, hermes_pw_*), so code errors are caught here too.
  arm64-cross:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up arm64 multiarch + cross toolchain
        run: |
          sudo dpkg --add-architecture arm64
          # Ubuntu 24.04 runners use deb822 /etc/apt/sources.list.d/ubuntu.sources.
          # Pin the default archive to amd64 (no arm64 there), add ports for arm64.
          sudo sed -i 's/^Types: deb/Types: deb\nArchitectures: amd64/' /etc/apt/sources.list.d/ubuntu.sources
          sudo tee /etc/apt/sources.list.d/ports-arm64.sources >/dev/null <<EOF
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports
          Suites: noble noble-updates noble-backports
          Components: main universe
          Architectures: arm64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          EOF
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config g++-aarch64-linux-gnu libpipewire-0.3-dev:arm64
      - name: Cross configure (RK3588 / aarch64)
        run: |
          cmake -S . -B build-arm64 \
            -DCMAKE_TOOLCHAIN_FILE=cmake/rk3588.toolchain.cmake \
            -DHERMES_BUILD_TESTS=OFF
      - name: Cross build (incl. PipeWire targets)
        run: cmake --build build-arm64 -j
